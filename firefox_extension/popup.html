<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebReranker</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      width: 260px;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
    }
    .mode-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .note {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <h1>WebReranker Mode</h1>
  <div class="mode-group">
    <label>
      <input type="radio" name="mode" value="reorder">
      Reorder results
    </label>
    <label>
      <input type="radio" name="mode" value="hide_low">
      Hide low-ranked results
    </label>
  </div>
  <div class="note">Applies immediately on supported pages.</div>
  <script src="popup.js"></script>
</body>
</html>
